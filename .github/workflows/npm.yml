name: npm

# Publishes the npm wrapper at npm/ to the npmjs.com registry.
# Triggered on every release tag (vX.Y.Z).
#
# Auth: npm OIDC Trusted Publisher (no NPM_TOKEN secret). Requires the
# corresponding configuration on npmjs.com side — without it, every
# publish fails with ENEEDAUTH. Setup checklist (one-time):
#
#   1. Sign in to https://www.npmjs.com/ as the package owner.
#   2. Go to https://www.npmjs.com/package/mcp-aemps/access
#      → tab "Provenance and Trusted Publishers"
#      → click "Add Trusted Publisher".
#   3. Provider:    GitHub Actions
#      Organization or user: romanpert
#      Repository:  mcp-aemps
#      Workflow filename:    npm.yml      (just the filename)
#      Environment: (leave empty)
#   4. Save.
#
# After configuration, OIDC works for `push: tags:` and `pull_request`
# events. npm explicitly rejects `workflow_dispatch` and
# `repository_dispatch` for trusted publishing — manual re-firing is
# only possible by tagging a new release.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (must already exist as a git tag)."
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  publish:
    name: Publish to npmjs
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org/"

      - name: Sync npm/package.json version with the git tag
        working-directory: npm
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          echo "Setting npm version to $VERSION"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Validate package contents
        working-directory: npm
        run: |
          npm pack --dry-run
          node bin/mcp-aemps.js --help || true   # smoke: file is executable

      - name: Publish (Trusted Publisher / OIDC)
        working-directory: npm
        # No NODE_AUTH_TOKEN env: with id-token:write + setup-node's
        # registry-url + a Trusted Publisher configured on npmjs (see the
        # header comment), npm CLI fetches its own publish token via
        # OIDC. Setting NODE_AUTH_TOKEN to an empty string (the previous
        # behaviour, when NPM_TOKEN secret was unset) made npm skip the
        # OIDC handshake and fail with ENEEDAUTH.
        run: npm publish --provenance --access public

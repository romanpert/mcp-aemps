name: npm

# Publishes the npm wrapper at npm/ to the npmjs.com registry.
# Triggered on every release tag (vX.Y.Z) and via manual dispatch.
#
# Auth: classic Granular Access Token stored as repo secret NPM_TOKEN
# (scoped to mcp-aemps only, publish permission). The OIDC Trusted
# Publisher path was attempted earlier but never produced a successful
# publish (npmjs.com only ever had v0.2.0 on disk; every release since
# silently failed with ENEEDAUTH because the empty NODE_AUTH_TOKEN
# short-circuited the OIDC handshake on npm CLI). Classic auth works
# for both `push: tags:` and `workflow_dispatch`, with no Trusted
# Publisher setup required on npmjs side. Provenance is still emitted
# (--provenance is independent from the auth method as long as
# id-token: write is granted).

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (must already exist as a git tag)."
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  publish:
    name: Publish to npmjs
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org/"

      - name: Sync npm/package.json version with the git tag
        working-directory: npm
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          echo "Setting npm version to $VERSION"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Validate package contents
        working-directory: npm
        run: |
          npm pack --dry-run
          node bin/mcp-aemps.js --help || true   # smoke: file is executable

      - name: Publish
        working-directory: npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

name: Docker MCP Registry sync

# Auto-opens a PR against romanpert/mcp-registry whenever a new tag is
# released. The PR updates servers/mcp-aemps/server.yaml + tools.json with
# the new version + commit SHA.
#
# Requires: a Personal Access Token stored as repo secret MCP_REGISTRY_PAT
# with scope: `public_repo` (just enough to push a branch and open a PR
# on the fork). Generate one at:
#   https://github.com/settings/tokens/new?scopes=public_repo&description=mcp-aemps-registry-sync
#
# If MCP_REGISTRY_PAT is not configured the workflow is skipped silently.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to sync (e.g. 0.1.6). Defaults to current pyproject version."
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  REGISTRY_FORK: romanpert/mcp-registry
  REGISTRY_UPSTREAM: docker/mcp-registry

jobs:
  sync:
    name: Sync mcp-aemps to docker/mcp-registry fork
    runs-on: ubuntu-latest
    if: ${{ secrets.MCP_REGISTRY_PAT != '' }}
    steps:
      - name: Checkout mcp-aemps
        uses: actions/checkout@v4
        with:
          path: mcp-aemps

      - name: Resolve version + commit
        id: meta
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          COMMIT="${GITHUB_SHA}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "commit=$COMMIT"   >> "$GITHUB_OUTPUT"
          echo "Resolved: version=$VERSION commit=$COMMIT"

      - name: Checkout fork of docker/mcp-registry
        uses: actions/checkout@v4
        with:
          repository: ${{ env.REGISTRY_FORK }}
          token: ${{ secrets.MCP_REGISTRY_PAT }}
          path: mcp-registry
          fetch-depth: 0

      - name: Sync fork with upstream main
        working-directory: mcp-registry
        run: |
          git remote add upstream "https://github.com/${{ env.REGISTRY_UPSTREAM }}.git"
          git fetch upstream main
          git checkout main
          git reset --hard upstream/main
          git push origin main --force

      - name: Create branch + copy artefacts + bump SHAs
        id: prep
        working-directory: mcp-registry
        env:
          NEW_COMMIT: ${{ steps.meta.outputs.commit }}
          NEW_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          BRANCH="bump-mcp-aemps-${NEW_VERSION}"
          git checkout -b "$BRANCH"
          mkdir -p servers/mcp-aemps
          cp ../mcp-aemps/.docker-mcp-registry/server.yaml servers/mcp-aemps/server.yaml
          cp ../mcp-aemps/.docker-mcp-registry/tools.json  servers/mcp-aemps/tools.json
          # Inject the resolved commit SHA into server.yaml (env var read by the script)
          python3 - <<'PY'
          import os, re, pathlib
          p = pathlib.Path("servers/mcp-aemps/server.yaml")
          text = p.read_text(encoding="utf-8")
          text = re.sub(r"(\s*commit:\s*).+", lambda m: m.group(1) + os.environ["NEW_COMMIT"], text)
          p.write_text(text, encoding="utf-8")
          print(p.read_text(encoding="utf-8"))
          PY
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Commit + push branch to fork
        working-directory: mcp-registry
        run: |
          git config user.email "noreply@github.com"
          git config user.name  "mcp-aemps-registry-bot"
          git add servers/mcp-aemps/
          if git diff --cached --quiet; then
            echo "No changes to push."
            exit 0
          fi
          git commit -m "Bump mcp-aemps to ${{ steps.meta.outputs.version }}"
          git push -u origin "${{ steps.prep.outputs.branch }}" --force

      - name: Open / update PR against docker/mcp-registry
        env:
          GH_TOKEN: ${{ secrets.MCP_REGISTRY_PAT }}
        run: |
          BRANCH="${{ steps.prep.outputs.branch }}"
          VERSION="${{ steps.meta.outputs.version }}"
          BODY=$(cat <<EOF
          Bumps **mcp-aemps** to \`${VERSION}\`.

          - PyPI: https://pypi.org/project/mcp-aemps/${VERSION}/
          - GHCR: https://github.com/romanpert/mcp-aemps/pkgs/container/mcp-aemps
          - Source: https://github.com/romanpert/mcp-aemps
          - Validated locally with \`.docker-mcp-registry/verify.sh\` (Dockerfile lint + healthcheck + MCP probe + 21 tools surface).

          Auto-generated by [docker-mcp-registry.yml](https://github.com/romanpert/mcp-aemps/blob/master/.github/workflows/docker-mcp-registry.yml).
          EOF
          )

          # Try to find an existing PR for this branch and update it; else create.
          gh pr view "$BRANCH" --repo "${{ env.REGISTRY_UPSTREAM }}" >/dev/null 2>&1 \
            && gh pr edit  "$BRANCH" --repo "${{ env.REGISTRY_UPSTREAM }}" --body "$BODY" \
            || gh pr create \
                --repo "${{ env.REGISTRY_UPSTREAM }}" \
                --head "romanpert:$BRANCH" \
                --base main \
                --title "Bump mcp-aemps to ${VERSION}" \
                --body  "$BODY"

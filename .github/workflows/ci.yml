name: CI

on:
  pull_request:
    branches: [master, dev]
  push:
    branches: [master, dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Opt into Node.js 24 for JavaScript-based actions (Node 20 is deprecated).
# See: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install ruff
        run: pip install ruff
      - name: Ruff check
        run: ruff check app/
      - name: Ruff format check
        run: ruff format --check app/

  test:
    name: Test (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install package + test deps
        run: |
          pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-asyncio
      - name: Run pytest
        run: pytest tests/ -v

  build:
    name: Build wheel & sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install poetry
        run: pip install "poetry>=2.0" twine
      - name: Build
        run: poetry build
      - name: Twine check
        run: python -m twine check dist/*
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  inspector:
    name: MCP Inspector compliance
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Install package
        run: |
          pip install --upgrade pip
          pip install -e .
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Run inspector compliance smoke
        run: bash tests/inspector_compliance.sh
        env:
          PORT: "18765"

  validate-server-json:
    name: Validate server.json
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download mcp-publisher
        run: |
          curl -sL -o pub.tar.gz "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz"
          tar xzf pub.tar.gz mcp-publisher
      - name: Validate server.json
        run: ./mcp-publisher validate

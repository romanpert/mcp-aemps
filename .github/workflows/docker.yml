name: Docker

on:
  # Build & push the Docker image only on minor releases (vX.Y.0).
  # Patch tags (vX.Y.1, vX.Y.2…) ride the existing :X.Y and :latest tags
  # produced by the previous minor build — keeps GHCR storage small and
  # avoids spamming users with image bumps for tiny patches.
  push:
    tags:
      - "v[0-9]+.[0-9]+.0"
    branches:
      - master
  pull_request:
    branches:
      - master
      - dev
  # Manual override for emergency patch images.
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to (re)build, e.g. v0.1.7 — must already exist as a git tag."
        required: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build & push (multi-arch)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          # When triggered by workflow_dispatch with an explicit tag, check
          # that tag out so the image matches the requested release.
          ref: ${{ inputs.tag || github.ref }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      # Single build that produces a multi-arch manifest list (linux/amd64 +
      # linux/arm64). Doing this in a matrix-of-platforms is a footgun: each
      # matrix job pushes to the same tag and the last writer wins, leaving
      # the manifest list with only one platform. One job → one manifest.
      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
